name: Publish to Stores

on:
  workflow_dispatch:
    inputs:
      publish_snap:
        description: 'Publish to Snap Store'
        required: false
        default: false
        type: boolean
      publish_ms_store:
        description: 'Publish to Microsoft Store'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-snap:
    if: inputs.publish_snap == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Snap
        run: npm run dist -- --linux snap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPX_PUBLISHER: ${{ secrets.APPX_PUBLISHER }}

      - name: Locate Snap Artifact
        id: snap_artifact
        shell: bash
        run: |
          snap_file=$(find release -maxdepth 1 -type f -name '*.snap' | head -n 1)
          if [ -z "$snap_file" ]; then
            echo "No .snap file found in release/"
            exit 1
          fi

          echo "Using snap artifact: $snap_file"
          echo "path=$snap_file" >> "$GITHUB_OUTPUT"

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snap_artifact.outputs.path }}
          release: stable

  publish-ms-store:
    if: inputs.publish_ms_store == true
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build AppX/MSIX
        # Force build of AppX/MSIX package
        run: npm run dist -- --win appx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPX_PUBLISHER: ${{ secrets.APPX_PUBLISHER }}

      - name: Setup Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.2

      - name: Configure Microsoft Store CLI
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId "$env:PARTNER_CENTER_TENANT_ID" `
            --sellerId "$env:PARTNER_CENTER_SELLER_ID" `
            --clientId "$env:PARTNER_CENTER_CLIENT_ID" `
            --clientSecret "$env:PARTNER_CENTER_CLIENT_SECRET"
        env:
          PARTNER_CENTER_TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          PARTNER_CENTER_CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          PARTNER_CENTER_CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}

      - name: Publish to Microsoft Store
        shell: pwsh
        run: |
          $file = Get-ChildItem release/*.appx, release/*.msix | Select-Object -First 1
          if ($file) {
            Write-Host "Publishing $($file.FullName)..."
            msstore publish . --inputFile "$($file.FullName)" --verbose
          } else {
            Write-Error "No AppX or MSIX file found in release folder."
          }
